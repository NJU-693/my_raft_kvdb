# Raft KV 集群配置文件

[cluster]
# 集群节点数量
node_count = 3

# 节点 1 配置
[node_1]
id = 1
host = 127.0.0.1
port = 8001
data_dir = ./data/node1

# 节点 2 配置
[node_2]
id = 2
host = 127.0.0.1
port = 8002
data_dir = ./data/node2

# 节点 3 配置
[node_3]
id = 3
host = 127.0.0.1
port = 8003
data_dir = ./data/node3

# Raft 算法参数
[raft]
# 选举超时时间范围（毫秒）
election_timeout_min = 150
election_timeout_max = 300

# 心跳间隔（毫秒）
heartbeat_interval = 50

# 日志批量大小
log_batch_size = 100

# RPC 超时时间（毫秒）
rpc_timeout = 1000

# 日志配置
[logging]
# 日志级别：DEBUG, INFO, WARN, ERROR
log_level = INFO

# 日志输出路径
log_file = ./logs/raft.log

# 是否输出到控制台
log_to_console = true
