# Raft KV 集群配置文件 (5 节点)

[cluster]
node_count = 5

[node_1]
id = 1
host = 127.0.0.1
port = 8001
data_dir = ./data/node1

[node_2]
id = 2
host = 127.0.0.1
port = 8002
data_dir = ./data/node2

[node_3]
id = 3
host = 127.0.0.1
port = 8003
data_dir = ./data/node3

[node_4]
id = 4
host = 127.0.0.1
port = 8004
data_dir = ./data/node4

[node_5]
id = 5
host = 127.0.0.1
port = 8005
data_dir = ./data/node5

[raft]
election_timeout_min = 150
election_timeout_max = 300
heartbeat_interval = 50
log_batch_size = 100
rpc_timeout = 1000

[logging]
log_level = INFO
log_file = ./logs/raft.log
log_to_console = true
