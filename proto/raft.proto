syntax = "proto3";

package raft;

// 日志条目消息
message LogEntryProto {
    int32 term = 1;      // 日志条目的任期号
    int32 index = 2;     // 日志条目的索引
    string command = 3;  // 状态机命令
}

// RequestVote RPC 请求
message RequestVoteRequest {
    int32 term = 1;           // 候选人的任期号
    int32 candidate_id = 2;   // 候选人的 ID
    int32 last_log_index = 3; // 候选人最后日志条目的索引
    int32 last_log_term = 4;  // 候选人最后日志条目的任期号
}

// RequestVote RPC 响应
message RequestVoteResponse {
    int32 term = 1;          // 当前任期号
    bool vote_granted = 2;   // 是否投票给候选人
}

// AppendEntries RPC 请求
message AppendEntriesRequest {
    int32 term = 1;                        // Leader 的任期号
    int32 leader_id = 2;                   // Leader 的 ID
    int32 prev_log_index = 3;              // 新日志条目之前的日志索引
    int32 prev_log_term = 4;               // prevLogIndex 处日志条目的任期号
    repeated LogEntryProto entries = 5;    // 要存储的日志条目（心跳时为空）
    int32 leader_commit = 6;               // Leader 的 commitIndex
}

// AppendEntries RPC 响应
message AppendEntriesResponse {
    int32 term = 1;           // 当前任期号
    bool success = 2;         // 是否成功
    int32 conflict_index = 3; // 冲突日志的索引（用于快速回退优化）
    int32 conflict_term = 4;  // 冲突日志的任期号（用于快速回退优化）
}

// 客户端请求消息
message ClientRequest {
    enum OperationType {
        PUT = 0;
        GET = 1;
        DELETE = 2;
    }
    
    OperationType operation = 1;  // 操作类型
    string key = 2;                // 键
    string value = 3;              // 值（仅 PUT 操作使用）
}

// 客户端响应消息
message ClientResponse {
    bool success = 1;              // 操作是否成功
    string value = 2;              // 返回值（仅 GET 操作使用）
    string error = 3;              // 错误信息
    bool is_leader = 4;            // 当前节点是否为 Leader
    string leader_address = 5;     // Leader 地址（用于重定向）
}

// Raft RPC 服务定义
service RaftService {
    // 请求投票 RPC
    rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
    
    // 追加日志条目 RPC（也用作心跳）
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

// 客户端服务定义
service ClientService {
    // 处理客户端 KV 操作请求
    rpc HandleRequest(ClientRequest) returns (ClientResponse);
}
